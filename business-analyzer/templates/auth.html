<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{{ 'Login' if mode=='login' else 'Register' }} — Business Growth Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Mulish:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#0a0c12;--card:#13161f;--border:#1e2230;--accent:#6c63ff;--accent2:#00d4aa;--text:#e8e8f0;--muted:#5a5f78;--err:#ff6b6b;--suc:#00d4aa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Mulish',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(108,99,255,0.12) 0%,transparent 70%);pointer-events:none;}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:48px 44px;width:100%;max-width:420px;position:relative;box-shadow:0 40px 100px rgba(0,0,0,0.5);}
.logo{text-align:center;margin-bottom:36px;}
.logo-icon{font-size:36px;display:block;margin-bottom:8px;}
.logo h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--text);}
.logo p{font-size:13px;color:var(--muted);margin-top:4px;}
.tab-row{display:flex;background:#0d0f18;border-radius:10px;padding:4px;margin-bottom:32px;}
.tab{flex:1;text-align:center;padding:9px;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;color:var(--muted);text-decoration:none;transition:.2s;}
.tab.active{background:var(--accent);color:#fff;}
.form-group{margin-bottom:18px;}
label{display:block;font-size:12px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
input{width:100%;background:#0d0f18;border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--text);font-family:'Mulish',sans-serif;font-size:14px;outline:none;transition:.2s;}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,.15);}
.btn{width:100%;background:var(--accent);border:none;border-radius:10px;padding:14px;color:#fff;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:8px;transition:.2s;letter-spacing:.04em;}
.btn:hover{background:#5a52e8;transform:translateY(-1px);}
.flash{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;}
.flash.error{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.3);color:var(--err);}
.flash.success{background:rgba(0,212,170,.12);border:1px solid rgba(0,212,170,.3);color:var(--suc);}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">📊</span>
    <h1>Business Growth Analyzer</h1>
    <p>Insights for small business owners</p>
  </div>
  <div class="tab-row">
    <a href="/login" class="tab {{ 'active' if mode=='login' }}">Login</a>
    <a href="/register" class="tab {{ 'active' if mode=='register' }}">Register</a>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" required placeholder="Enter username" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required placeholder="Enter password" autocomplete="{{ 'current-password' if mode=='login' else 'new-password' }}"/>
    </div>
    <button class="btn" type="submit">{{ 'Sign In →' if mode=='login' else 'Create Account →' }}</button>
  </form>
</div>
</body>
</html>
